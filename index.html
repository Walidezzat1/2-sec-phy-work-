<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك أسئلة الشغل والطاقة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
        }
        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen flex justify-center p-4 md:p-8">
        
        <!-- شاشة الاختبار -->
        <div id="quiz-screen" class="bg-white rounded-3xl shadow-2xl max-w-4xl w-full flex flex-col overflow-hidden border border-slate-100 hidden">
            
            <!-- Header -->
            <div class="bg-indigo-600 text-white p-8 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
                <i data-lucide="book-open" class="absolute -left-12 -bottom-12 w-48 h-48 text-indigo-500 opacity-20 pointer-events-none"></i>
                <div class="z-10 text-center md:text-right">
                    <h1 class="text-3xl md:text-4xl font-black mb-2">بنك أسئلة الشغل والطاقة</h1>
                    <p class="text-indigo-100 text-lg opacity-90">الفيزياء - الصف الثاني الثانوي</p>
                    <div class="mt-4 inline-block bg-indigo-800/40 backdrop-blur-sm px-5 py-2 rounded-full border border-indigo-400/30">
                        <p class="text-yellow-300 text-sm font-bold">✨ إعداد موجه الفيزياء أ/ وليد عزت</p>
                    </div>
                </div>
                <div class="z-10 bg-white/10 backdrop-blur-md border border-white/20 px-8 py-4 rounded-3xl flex flex-col items-center min-w-[120px]">
                    <span class="text-indigo-100 text-xs font-bold uppercase mb-1">النتيجة</span>
                    <span id="score-display" class="text-4xl font-black">0</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-slate-100 h-3">
                <div id="progress-bar" class="bg-green-500 h-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>

            <!-- Question Area -->
            <div class="p-8 md:p-12 flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-10">
                    <span id="question-counter" class="text-sm font-bold text-slate-500 bg-slate-100 px-5 py-2 rounded-full border border-slate-200">
                        سؤال 1 من 100
                    </span>
                    <span id="question-type" class="text-sm font-black px-5 py-2 rounded-full shadow-sm">
                        نوع السؤال
                    </span>
                </div>
                
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-10 leading-relaxed text-slate-800">
                    نص السؤال
                </h2>

                <!-- Options -->
                <div id="options-container" class="space-y-4 mb-10">
                    <!-- الخيارات سيتم إضافتها هنا بواسطة جافاسكربت -->
                </div>

                <!-- Explanation Box -->
                <div id="explanation-box" class="hidden mt-auto p-8 rounded-2xl border-r-8 shadow-md slide-up">
                    <h3 id="explanation-title" class="font-black text-xl mb-3"></h3>
                    <p class="text-slate-700 leading-relaxed text-lg">
                        <strong class="text-indigo-900">الشرح:</strong> <span id="explanation-text"></span>
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-8 bg-slate-50 border-t border-slate-200 flex justify-end">
                <button id="next-btn" disabled class="flex items-center gap-3 px-10 py-5 rounded-2xl font-bold text-xl transition-all bg-slate-200 text-slate-400 cursor-not-allowed">
                    <span id="next-btn-text">السؤال التالي</span>
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- شاشة النتيجة النهائية -->
        <div id="result-screen" class="bg-white rounded-3xl shadow-2xl p-10 max-w-xl w-full text-center border-t-8 border-indigo-600 hidden my-auto">
            <i id="trophy-icon" data-lucide="trophy" class="w-24 h-24 mx-auto mb-6 text-slate-400"></i>
            <h2 class="text-3xl font-bold mb-4 text-slate-800">انتهى التحدي المئوي!</h2>
            <p class="text-xl mb-6 text-slate-600">
                لقد أجبت بشكل صحيح على <span id="final-score" class="font-bold text-indigo-600 text-3xl">0</span> من أصل <span class="font-bold text-2xl">100</span> سؤال.
            </p>
            <div class="w-full bg-slate-200 rounded-full h-4 mb-8">
                <div id="final-progress" class="h-4 rounded-full transition-all duration-1000 bg-red-500" style="width: 0%"></div>
            </div>
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8 text-right">
                <p id="final-message" class="text-lg font-bold text-slate-700 text-center mb-6">
                    رسالة النتيجة
                </p>
                
                <!-- واجهة إرسال النتيجة -->
                <div class="border-t border-slate-200 pt-6 mt-4">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center justify-center gap-2">
                        إرسال النتيجة للمعلم
                    </h3>
                    <div class="flex flex-col gap-4">
                        <input
                            type="text"
                            id="student-name"
                            placeholder="اكتب اسمك الثلاثي هنا..."
                            class="p-3 rounded-xl border border-slate-300 w-full focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-right"
                            dir="rtl"
                        />
                        <div class="flex flex-col sm:flex-row gap-3">
                            <button onclick="sendViaWhatsApp()" class="flex-1 flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#1ebe57] text-white font-bold py-3 px-4 rounded-xl transition-all shadow-sm">
                                <i data-lucide="message-circle" class="w-5 h-5"></i>
                                إرسال واتساب
                            </button>
                            <button onclick="sendViaEmail()" class="flex-1 flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-sm">
                                <i data-lucide="mail" class="w-5 h-5"></i>
                                إرسال إيميل
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="startQuiz()" class="flex items-center justify-center w-full gap-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 px-6 rounded-2xl transition-all shadow-lg hover:shadow-indigo-200 hover:-translate-y-1 text-xl">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                إعادة الاختبار للتدريب
            </button>
        </div>

        <!-- شاشة التحميل -->
        <div id="loading-screen" class="my-auto text-xl font-bold">جاري تحميل الأسئلة...</div>

    </div>

    <script>
        // 🔴 إعدادات الإرسال (واتساب والإيميل)
        const TEACHER_WHATSAPP = ""; // مثال: "96512345678"
        const TEACHER_EMAIL = "teacher@school.com";

        // بنك الأسئلة الأساسي (40 سؤالاً)
        const rawQuestions = [
            {
                type: "علل", text: "عندما يحمل شخص حقيبة ويسير بها أفقياً، فإن الشغل المبذول على الحقيبة بواسطة قوة الرفع يساوي صفراً.",
                options: [
                    { text: "لأن القوة المؤثرة تكون عمودية على اتجاه الإزاحة، وبالتالي cos 90° = 0.", isCorrect: true },
                    { text: "لأن قوة الاحتكاك مع الأرض تلغي قوة رفع الحقيبة، فتصبح المحصلة صفراً.", isCorrect: false },
                    { text: "لأن الحقيبة تظل ساكنة بالنسبة للشخص الذي يحملها، فلا توجد طاقة حركة.", isCorrect: false },
                    { text: "لأن القوة المؤثرة تكون في نفس اتجاه الإزاحة، وبالتالي cos 0° = 1.", isCorrect: false }
                ], explanation: "شرط بذل الشغل ألا تكون الزاوية بين القوة والإزاحة 90 درجة (عمودية)."
            },
            {
                type: "مفهوم", text: "أي من وحدات القياس التالية لا تكافئ وحدة الجول؟",
                options: [
                    { text: "N · m/s", isCorrect: true },
                    { text: "N · m", isCorrect: false },
                    { text: "kg · m² / s²", isCorrect: false },
                    { text: "W · s (وات.ثانية)", isCorrect: false }
                ], explanation: "وحدة N.m/s تكافئ الوات (وحدة القدرة)، بينما الجول يكافئ N.m."
            },
            {
                type: "مسألة", text: "أثرت قوة مقدارها 100N على صندوق فحركته إزاحة مقدارها 5m. إذا كان اتجاه القوة يميل بزاوية 60° على اتجاه الحركة، فما هو الشغل المبذول؟",
                options: [
                    { text: "250 J", isCorrect: true },
                    { text: "500 J", isCorrect: false },
                    { text: "0 J", isCorrect: false },
                    { text: "433 J", isCorrect: false }
                ], explanation: "W = F × d × cos(θ) = 100 × 5 × cos(60) = 500 × 0.5 = 250 J."
            },
            {
                type: "ماذا يحدث", text: "للشغل المبذول بواسطة قوة إذا كانت الزاوية بين اتجاه القوة واتجاه الإزاحة منفرجة (أكبر من 90 وأقل من 180)؟",
                options: [
                    { text: "الحدث: يكون الشغل سالباً.\nالتفسير: لأن جيب تمام الزاوية المنفرجة يحمل إشارة سالبة.", isCorrect: true },
                    { text: "الحدث: يكون الشغل موجباً.\nالتفسير: لأن القوة تبذل جهداً في نفس الاتجاه.", isCorrect: false },
                    { text: "الحدث: ينعدم الشغل.\nالتفسير: لأن الزاوية أكبر من 90 درجة.", isCorrect: false },
                    { text: "الحدث: يكون الشغل قيمة عظمى.\nالتفسير: لأن الإزاحة تزداد بزيادة الزاوية.", isCorrect: false }
                ], explanation: "في الربع الثاني، قيمة cos(θ) سالبة، وبالتالي الشغل يكون سالباً (مثل قوة الاحتكاك)."
            },
            {
                type: "علل", text: "الشغل كمية فيزيائية قياسية وليست متجهة، بالرغم من أنه يعتمد على القوة والإزاحة وهما كميتان متجهتان.",
                options: [
                    { text: "لأنه ناتج عن عملية الضرب القياسي لمتجهي القوة والإزاحة.", isCorrect: true },
                    { text: "لأنه ناتج عن عملية الضرب الاتجاهي لمتجهي القوة والإزاحة.", isCorrect: false },
                    { text: "لأن القوة والإزاحة دائماً يكونان في نفس الاتجاه أثناء بذل الشغل.", isCorrect: false },
                    { text: "لأن الشغل يعتمد فقط على مقدار القوة ولا يعتمد على الإزاحة.", isCorrect: false }
                ], explanation: "حاصل الضرب القياسي (Dot Product) لمتجهين ينتج كمية قياسية ليس لها اتجاه."
            },
            {
                type: "مسألة", text: "شخص يرفع دلواً كتلته 10kg رأسياً لأعلى مسافة 2m. ما مقدار الشغل المبذول ضد الجاذبية؟ (g = 10 m/s²)",
                options: [
                    { text: "200 J", isCorrect: true },
                    { text: "20 J", isCorrect: false },
                    { text: "100 J", isCorrect: false },
                    { text: "0 J", isCorrect: false }
                ], explanation: "الشغل ضد الجاذبية = m × g × h = 10 × 10 × 2 = 200 جول."
            },
            {
                type: "علل", text: "عندما يدفع شخص حائطاً خرسانياً ثابتاً بقوة كبيرة جداً، فإنه لا يبذل شغلاً فيزيائياً.",
                options: [
                    { text: "لأن الحائط لم يتحرك وبالتالي الإزاحة تساوي صفراً، والشغل فيزيائياً يتطلب حدوث إزاحة.", isCorrect: true },
                    { text: "لأن القوة المؤثرة تكون عمودية على الحائط، وبالتالي cos 90° = 0.", isCorrect: false },
                    { text: "لأن الحائط يرد بقوة مساوية ومضادة، فتكون محصلة الشغل صفراً.", isCorrect: false },
                    { text: "لأن طاقة الشخص تتحول إلى طاقة حرارية فقط.", isCorrect: false }
                ], explanation: "الجهد العضلي لا يعتبر شغلاً فيزيائياً إلا إذا صاحبه إزاحة (d > 0)."
            },
            {
                type: "مسألة", text: "طفلة تحمل حقيبة كتلتها 5kg وتسير بها أفقياً بسرعة منتظمة مسافة 10m. الشغل المبذول بواسطة قوة رفع الطفلة للحقيبة هو:",
                options: [
                    { text: "0 J", isCorrect: true },
                    { text: "50 J", isCorrect: false },
                    { text: "500 J", isCorrect: false },
                    { text: "5 J", isCorrect: false }
                ], explanation: "قوة الرفع لأعلى والحركة أفقية، الزاوية 90 درجة، إذن الشغل صفر."
            },
            {
                type: "ماذا يحدث", text: "لقيمة الشغل عندما يتحرك جسم تحت تأثير قوة في اتجاه معاكس تماماً لحركته (زاوية 180)؟",
                options: [
                    { text: "الحدث: يكون الشغل سالباً ويمثل قيمة عظمى سالبة.\nالتفسير: لأن cos 180° = -1، مثل شغل قوة الاحتكاك.", isCorrect: true },
                    { text: "الحدث: يكون الشغل موجباً.\nالتفسير: لأن القوة والإزاحة على نفس الخط.", isCorrect: false },
                    { text: "الحدث: ينعدم الشغل.\nالتفسير: لأن الجسمين يتضادان في الاتجاه.", isCorrect: false },
                    { text: "الحدث: يقل تدريجياً حتى ينعدم.\nالتفسير: بسبب تناقص السرعة.", isCorrect: false }
                ], explanation: "قوة الاحتكاك تبذل شغلاً سالباً لأنها عكس اتجاه الحركة."
            },
            {
                type: "مسألة بيانية", text: "أثرت قوة ثابتة على جسم وحركته إزاحة. إذا رسمنا العلاقة البيانية بين القوة (F) والإزاحة (d)، فكيف يمكن حساب الشغل هندسياً؟",
                options: [
                    { text: "عن طريق حساب المساحة أسفل الخط المستقيم لمنحنى (القوة - الإزاحة).", isCorrect: true },
                    { text: "عن طريق حساب ميل الخط المستقيم لمنحنى (القوة - الإزاحة).", isCorrect: false },
                    { text: "عن طريق قسمة أقصى قوة على أقصى إزاحة.", isCorrect: false },
                    { text: "الشغل يساوي صفر دائماً ما لم يكن الخط مائلاً.", isCorrect: false }
                ], explanation: "المساحة تحت المنحنى تمثل (القوة × الإزاحة) وهو الشغل."
            },
            {
                type: "علل", text: "الشغل المبذول بواسطة قوة الجاذبية المركزية على قمر صناعي يدور حول الأرض يساوي صفراً.",
                options: [
                    { text: "لأن قوة التجاذب عمودية دائماً على اتجاه الحركة المماسية للمسار الدائري.", isCorrect: true },
                    { text: "لأن القمر الصناعي في حالة انعدام وزن.", isCorrect: false },
                    { text: "لأن سرعة القمر الصناعي ثابتة المقدار.", isCorrect: false },
                    { text: "لأن الإزاحة الكلية خلال دورة كاملة تساوي صفراً.", isCorrect: false }
                ], explanation: "القوة المركزية تعامد الإزاحة اللحظية دائماً (cos 90 = 0)."
            },
            {
                type: "مسألة", text: "قوة قدرها 50N تُبذل بزاوية 0° لدفع جسم مسافة 10m. ما قيمة الشغل؟",
                options: [
                    { text: "500 J", isCorrect: true },
                    { text: "0 J", isCorrect: false },
                    { text: "50 J", isCorrect: false },
                    { text: "250 J", isCorrect: false }
                ], explanation: "W = F × d × cos(0) = 50 × 10 × 1 = 500 J."
            },
            {
                type: "ماذا يحدث", text: "لمقدار الشغل المبذول إذا تضاعفت القوة المؤثرة في نفس اتجاه الحركة، وتضاعفت الإزاحة المقطوعة؟",
                options: [
                    { text: "الحدث: يزداد الشغل إلى أربعة أمثاله.\nالتفسير: لأن الشغل يساوي حاصل ضرب القوة في الإزاحة (2F × 2d = 4W).", isCorrect: true },
                    { text: "الحدث: يزداد للضعف.\nالتفسير: لأن الزيادة في أحدهما تعوض الآخر.", isCorrect: false },
                    { text: "الحدث: يظل ثابتاً.\nالتفسير: لأن النسبة بينهما ثابتة.", isCorrect: false },
                    { text: "الحدث: يزداد إلى ثمانية أمثاله.\nالتفسير: لأنه يتناسب مكعبياً معهما.", isCorrect: false }
                ], explanation: "بضرب الطرفين في 2، تصبح W = (2F) × (2d) = 4 Fd = 4W."
            },
            {
                type: "علل", text: "يفضل استخدام المستويات المائلة في رفع الأجسام الثقيلة بدلاً من رفعها رأسياً.",
                options: [
                    { text: "لتقليل القوة المطلوبة للرفع، رغم أن الشغل المبذول يظل ثابتاً (بإهمال الاحتكاك).", isCorrect: true },
                    { text: "لتقليل الشغل الكلي المبذول.", isCorrect: false },
                    { text: "لزيادة طاقة وضع الجسم بشكل أكبر.", isCorrect: false },
                    { text: "لتقليل المسافة المقطوعة لرفع الجسم.", isCorrect: false }
                ], explanation: "المستوى المائل يزيد المسافة ويقلل القوة المطلوبة، ولكن الشغل (mgh) يظل ثابتاً."
            },
            {
                type: "مسألة", text: "سُحب صندوق بقوة 40N تميل بزاوية 60° على الأفقي لمسافة 10m. الشغل المبذول هو:",
                options: [
                    { text: "200 J", isCorrect: true },
                    { text: "400 J", isCorrect: false },
                    { text: "346 J", isCorrect: false },
                    { text: "0 J", isCorrect: false }
                ], explanation: "W = 40 × 10 × cos(60) = 400 × 0.5 = 200 J."
            },
            {
                type: "ماذا يحدث", text: "للشغل المبذول بواسطة قوة الاحتكاك بين إطارات السيارة والطريق عند الضغط على الفرامل؟",
                options: [
                    { text: "الحدث: يكون سالباً ويؤدي إلى تناقص طاقة حركة السيارة.\nالتفسير: لأن قوة الاحتكاك تؤثر في اتجاه معاكس لاتجاه الإزاحة.", isCorrect: true },
                    { text: "الحدث: يكون موجباً ويزيد من سرعة السيارة.\nالتفسير: لأن الاحتكاك يولد طاقة حرارية.", isCorrect: false },
                    { text: "الحدث: ينعدم الشغل.\nالتفسير: لأن السيارة تتوقف في النهاية.", isCorrect: false },
                    { text: "الحدث: يكون عمودياً على الحركة.\nالتفسير: لأن وزن السيارة للأسفل.", isCorrect: false }
                ], explanation: "قوة الاحتكاك عكس الحركة (زاوية 180)، الشغل سالب ويستنفد الطاقة الحركية."
            },
            {
                type: "مسألة بيانية", text: "في الرسم البياني بين القوة (صادي) والإزاحة (سيني)، إذا كان الشكل الناتج مستطيلاً أبعاده (5 نيوتن و 4 متر)، فإن الشغل يساوي:",
                options: [
                    { text: "20 J", isCorrect: true },
                    { text: "10 J", isCorrect: false },
                    { text: "9 J", isCorrect: false },
                    { text: "1 J", isCorrect: false }
                ], explanation: "المساحة = الطول × العرض = 5 × 4 = 20 جول."
            },
            {
                type: "علل", text: "الشغل المبذول لدفع سيارة ساكنة لتتحرك على طريق أفقي يكون موجباً.",
                options: [
                    { text: "لأن اتجاه قوة الدفع يكون في نفس اتجاه حركة (إزاحة) السيارة، فتكون الزاوية صفراً.", isCorrect: true },

        // توليد بنك الأسئلة ليصبح 100
        const generateFull100Bank = () => {
            let fullBank = [...rawQuestions];
            for (let i = 0; i < 60; i++) {
                const template = rawQuestions[i % rawQuestions.length];
                const newQuestion = JSON.parse(JSON.stringify(template)); // Deep copy
                
                if (newQuestion.type === "مسألة" && newQuestion.text.includes("100N")) {
                    newQuestion.text = `أثرت قوة مقدارها ${200 + i}N على صندوق فحركته إزاحة مقدارها 5m. الزاوية 60°، ما الشغل؟`;
                    const result = (200 + i) * 5 * 0.5;
                    newQuestion.options = [
                        { text: `${result} J`, isCorrect: true },
                        { text: `${result * 2} J`, isCorrect: false },
                        { text: "0 J", isCorrect: false },
                        { text: "250 J", isCorrect: false }
                    ];
                    newQuestion.explanation = `W = F × d × cos(60) = ${200 + i} × 5 × 0.5 = ${result} J.`;
                } else {
                    newQuestion.text = `(مراجعة إضافية) ` + newQuestion.text;
                }
                fullBank.push(newQuestion);
            }
            return fullBank.slice(0, 100);
        };

        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        // حالة التطبيق (State)
        let quiz100 = [];
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let selectedOption = null;

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            quiz100 = generateFull100Bank();
            startQuiz();
            
            // تهيئة زر التالي
            document.getElementById('next-btn').addEventListener('click', handleNextQuestion);
        });

        function startQuiz() {
            // تجهيز الأسئلة
            questions = shuffleArray(quiz100).map(q => ({
                ...q,
                options: shuffleArray(q.options)
            }));
            
            currentIndex = 0;
            score = 0;
            selectedOption = null;
            
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            updateScoreDisplay();

            document.getElementById('question-text').innerText = question.text;
            
            // نوع السؤال
            const typeBadge = document.getElementById('question-type');
            typeBadge.innerText = question.type;
            typeBadge.className = `text-sm font-black px-5 py-2 rounded-full shadow-sm ${
                question.type === 'مسألة' ? 'bg-blue-100 text-blue-700' :
                question.type === 'علل' ? 'bg-purple-100 text-purple-700' :
                'bg-orange-100 text-orange-700'
            }`;

            // زر التالي
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "flex items-center gap-3 px-10 py-5 rounded-2xl font-bold text-xl transition-all bg-slate-200 text-slate-400 cursor-not-allowed";
            document.getElementById('next-btn-text').innerText = (currentIndex + 1 === questions.length) ? 'رؤية النتيجة النهائية' : 'السؤال التالي';
            
            // إخفاء الشرح
            document.getElementById('explanation-box').classList.add('hidden');

            // الخيارات
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right p-6 rounded-2xl border-2 transition-all duration-200 shadow-sm flex items-center gap-4 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 bg-white hover:shadow-md";
                btn.onclick = () => handleOptionClick(option, idx);
                
                // تركيبة الأيقونة والنص
                btn.innerHTML = `
                    <div class="flex-shrink-0" id="icon-container-${idx}">
                        <div class="w-7 h-7 rounded-full border-2 border-slate-300"></div>
                    </div>
                    <span class="text-lg md:text-xl font-medium leading-relaxed whitespace-pre-line">${option.text}</span>
                `;
                
                optionsContainer.appendChild(btn);
            });
            
            lucide.createIcons();
        }

        function handleOptionClick(option, selectedIdx) {
            if (selectedOption !== null) return; // منع النقر المتعدد
            selectedOption = option;
            
            if (option.isCorrect) {
                score++;
                updateScoreDisplay();
            }

            const question = questions[currentIndex];
            const optionsContainer = document.getElementById('options-container');
            const buttons = optionsContainer.querySelectorAll('button');

            buttons.forEach((btn, idx) => {
                const opt = question.options[idx];
                const iconContainer = btn.querySelector('div.flex-shrink-0');
                
                // تحديث الستايل للخيارات
                if (opt.isCorrect) {
                    btn.className = "w-full text-right p-6 rounded-2xl border-2 transition-all duration-200 shadow-sm flex items-center gap-4 border-green-500 bg-green-50 text-green-900";
                    iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="w-7 h-7 text-green-600"></i>';
                } else if (idx === selectedIdx && !opt.isCorrect) {
                    btn.className = "w-full text-right p-6 rounded-2xl border-2 transition-all duration-200 shadow-sm flex items-center gap-4 border-red-500 bg-red-50 text-red-900";
                    iconContainer.innerHTML = '<i data-lucide="x-circle" class="w-7 h-7 text-red-600"></i>';
                } else {
                    btn.className = "w-full text-right p-6 rounded-2xl border-2 transition-all duration-200 shadow-sm flex items-center gap-4 border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                    if(idx !== selectedIdx) {
                        iconContainer.innerHTML = '<div class="w-7 h-7"></div>'; // فارغ
                    }
                }
            });

            // إظهار الشرح
            const explanationBox = document.getElementById('explanation-box');
            const explanationTitle = document.getElementById('explanation-title');
            
            explanationBox.classList.remove('hidden', 'bg-green-50', 'border-green-500', 'bg-amber-50', 'border-amber-500');
            
            if(option.isCorrect) {
                explanationBox.classList.add('bg-green-50', 'border-green-500');
                explanationTitle.className = 'font-black text-xl mb-3 text-green-800';
                explanationTitle.innerText = 'إجابة عبقرية! ✨';
            } else {
                explanationBox.classList.add('bg-amber-50', 'border-amber-500');
                explanationTitle.className = 'font-black text-xl mb-3 text-amber-800';
                explanationTitle.innerText = 'محاولة جيدة، لاحظ التفسير 💡';
            }
            
            document.getElementById('explanation-text').innerText = question.explanation;

            // تفعيل زر التالي
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = "flex items-center gap-3 px-10 py-5 rounded-2xl font-bold text-xl transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl hover:-translate-x-1";
            
            lucide.createIcons();
        }

        function handleNextQuestion() {
            if (currentIndex + 1 < questions.length) {
                currentIndex++;
                renderQuestion();
            } else {
                showFinalResult();
            }
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').innerText = score;
        }

        function showFinalResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').innerText = score;
            
            const progressBar = document.getElementById('final-progress');
            progressBar.style.width = `${percentage}%`;
            
            const trophy = document.getElementById('trophy-icon');
            const message = document.getElementById('final-message');

            progressBar.classList.remove('bg-green-500', 'bg-yellow-500', 'bg-red-500');
            trophy.classList.remove('text-yellow-500', 'text-slate-400');

            if (percentage >= 80) {
                progressBar.classList.add('bg-green-500');
                trophy.classList.add('text-yellow-500');
                message.innerText = 'أداء مذهل! أنت عبقري في الفيزياء.';
            } else if (percentage >= 50) {
                progressBar.classList.add('bg-yellow-500');
                trophy.classList.add('text-yellow-500');
                message.innerText = 'أداء جيد جداً، استمر في المراجعة.';
            } else {
                progressBar.classList.add('bg-red-500');
                trophy.classList.add('text-slate-400');
                message.innerText = 'تحتاج لمراجعة قوانين الشغل والطاقة مرة أخرى.';
            }
        }

        // --- وظائف الإرسال ---
        function generateMessageText() {
            const studentName = document.getElementById('student-name').value;
            const percentage = Math.round((score / questions.length) * 100);
            return `مرحباً أستاذ،\nأنا الطالب: *${studentName}*\nلقد أنهيت اختبار بنك أسئلة الفيزياء (الشغل والطاقة).\n\n📊 *النتيجة:* ${score} من ${questions.length} (${percentage}%)`;
        }

        function sendViaWhatsApp() {
            const studentName = document.getElementById('student-name').value;
            if (!studentName.trim()) {
                alert("الرجاء كتابة اسمك الثلاثي أولاً!");
                return;
            }
            const text = encodeURIComponent(generateMessageText());
            const url = TEACHER_WHATSAPP 
                ? `https://wa.me/${TEACHER_WHATSAPP}?text=${text}`
                : `https://wa.me/?text=${text}`;
            window.open(url, '_blank');
        }

        function sendViaEmail() {
            const studentName = document.getElementById('student-name').value;
            if (!studentName.trim()) {
                alert("الرجاء كتابة اسمك الثلاثي أولاً!");
                return;
            }
            const subject = encodeURIComponent(`نتيجة اختبار الفيزياء - الطالب: ${studentName}`);
            const body = encodeURIComponent(generateMessageText());
            const url = `mailto:${TEACHER_EMAIL}?subject=${subject}&body=${body}`;
            window.open(url, '_blank');
        }

    </script>
</body>
</html>
